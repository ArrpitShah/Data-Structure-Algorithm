name: C++ Build Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install G++
      run: sudo apt-get install -y g++

    - name: Compile all C++ files
      run: |
        find . -name "*.cpp" | while read file; do
          echo "Compiling $file"
          g++ -o /dev/null "$file" && echo "✅ OK" || echo "❌ FAILED: $file"
        done
